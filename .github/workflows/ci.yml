name: Video Converter - CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'compose.dev.yaml'
      - '.dockerignore'
      - 'tests/**'
      - 'CHANGELOG.md'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - 'package.json'
      - 'scripts/validate-changelog.*'
      - '.github/workflows/ci.yml'
      - '.github/workflows/build-jobs.yml'
      - '.github/workflows/smoke-tests.yml'
      - '.github/workflows/release.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'Dockerfile'
      - 'compose.yaml'
      - 'compose.dev.yaml'
      - '.dockerignore'
      - 'tests/**'
      - 'CHANGELOG.md'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - 'package.json'
      - 'scripts/validate-changelog.*'
      - '.github/workflows/ci.yml'
      - '.github/workflows/build-jobs.yml'
      - '.github/workflows/smoke-tests.yml'
      - '.github/workflows/release.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Lint, Test & Build Docker
    uses: ./.github/workflows/build-jobs.yml
    with:
      build_docker: true
      push_docker: false

  smoke-tests:
    name: Smoke Tests
    needs: build
    uses: ./.github/workflows/smoke-tests.yml
    with:
      checkout_ref: ${{ github.sha }}
